<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Multimedia</title>
</head>
<body>
    <h1>Giới thiệu sản phẩm Multimedia</h1>
    <section>
        <h2>Hình ảnh sản phẩm</h2>
        <figure>
            <img src="https://placehold.co/400x250"
                 alt="iPhone 16 Pro Max màu Titan"
                 loading="lazy"
                 style="max-width: 100%; height: auto;">
            <figcaption>iPhone 16 Pro Max</figcaption>
        </figure>
        <figure>
            <img src="https://placehold.co/400x250"
                 alt="MacBook Air M4 màu bạc"
                 loading="lazy"
                 style="max-width: 100%; height: auto;">
            <figcaption>MacBook Air M4</figcaption>
        </figure>
        <figure>
            <img src="https://placehold.co/400x250"
                 alt="Apple Watch Series 11 màu đen"
                 loading="lazy"
                 style="max-width: 100%; height: auto;">
            <figcaption>Apple Watch Series 11</figcaption>
        </figure>
    </section>
    <section>
        <h2>Video YouTube</h2>
        <iframe width="560" height="315"
                src="https://www.youtube.com/embed/aqz-KE-bpKQ"
                title="Video giới thiệu"
                allowfullscreen>
        </iframe>
    </section>
    <section>
        <h2>Video HTML5</h2>
        <video controls poster="https://placehold.co/640x360"
                style="max-width: 100%; height: auto;">
            <source src="demo.mp4" type="video/mp4">
            <source src="demo.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ video.
        </video>
    </section>
    <section>
        <h2>Audio giới thiệu</h2>
        <audio controls>
            <source src="music.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ audio.
        </audio>
    </section>
    <section>
        <h2>Logo SVG</h2>
        <svg width="200" height="200">
            <circle cx="100" cy="100" r="80" stroke="black" stroke-width="3" fill="lightblue"></circle>
            <text x="55" y="110" font-size="24">SHOP</text>
        </svg>
    </section>
</body>
</html>
