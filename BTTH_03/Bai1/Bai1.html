<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="main-title">HỆ THỐNG QUẢN LÝ SINH VIÊN</h1>
    <div class="app-container">
        <div class="toolbar">
            <button id="btn-add-trigger" class="btn-main">Thêm sinh viên</button>
            <div id="toast-notification" class="notification-box hide"></div> 
        </div>

        <div class="statistics-bar">
            <div class="stat-card">
                <span class="stat-label">Tổng số sinh viên</span>
                <strong id="stat-total">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Điểm trung bình cả lớp</span>
                <strong id="stat-avg">0.0</strong>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Mã SV</th>
                        <th>Họ tên</th>
                        <th>Ngày sinh</th>
                        <th>Lớp</th>
                        <th>Điểm trung bình</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="form-popup" class="popup-overlay hide">
        <div class="popup-content">
            <div class="popup-header">
                <h2 id="form-title">Thêm sinh viên</h2>
                <button type="button" id="btn-close-popup" class="close-x">&times;</button>
            </div>

            <form id="student-form" data-mode="add">
                <div class="form-group">
                    <label for="txt-id">Mã sinh viên<span class="requied">*</span></label>
                    <input type="text" id="txt-id" required placeholder="Vd: 2451123456">
                </div>

                <div class="form-group">
                    <label for="txt-name">Họ và tên<span class="required">*</span></label>
                    <input type="text" id="txt-name" required placeholder="Vd: Nguyễn Văn A">
                </div>

                <div class="form-group">
                    <label for="txt-dob">Ngày sinh<span class="required">*</span></label>
                    <input type="date" id="txt-dob" required>
                </div>

                <div class="form-group">
                    <label for="txt-class">Lớp học<span class="required">*</span></label>
                    <input type="text" id="txt-class" required placeholder="Vd: 66HTTT1">
                </div>

                <div class="form-group">
                    <label for="txt-score">Điểm trung bình<span class="required">*</span></label>
                    <input type="number" id="txt-score" min="0" max="10" step="0.01" required placeholder="Vd: 9.5">
                </div>

                <div class="form-group">
                    <label for="txt-email">Email<span class="required">*</span></label>
                    <input type="email" id="txt-email" required placeholder="username@gmail.com">
                </div>

                <div class="form-actions">
                    <button type="submit" id="btn-submit" class="btn-main">
                        Lưu dữ liệu
                    </button>

                    <button type="button" id="btn-cancel" class="btn-secondary">
                        Hủy
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
